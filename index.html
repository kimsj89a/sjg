<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Market Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="logo">Market Dashboard</h1>
        <span class="clock" id="clock"></span>
      </div>
      <div class="header-right">
        <span class="status-dot live"></span>
        <span class="status-text">LIVE</span>
      </div>
    </header>

    <!-- Ticker Bar -->
    <div class="ticker-bar" id="ticker-bar"></div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Sidebar: Instrument List -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">Instruments</div>
        <ul class="instrument-list" id="instrument-list"></ul>
      </aside>

      <!-- Chart Area -->
      <div class="chart-area">
        <!-- Timeframe Selector -->
        <div class="chart-toolbar">
          <div class="chart-title" id="chart-title">S&P 500</div>
          <div class="timeframe-group" id="timeframe-group">
            <button class="tf-btn active" data-tf="realtime">Realtime</button>
            <button class="tf-btn" data-tf="1m">1m</button>
            <button class="tf-btn" data-tf="5m">5m</button>
            <button class="tf-btn" data-tf="60m">60m</button>
            <button class="tf-btn" data-tf="1d">1D</button>
            <button class="tf-btn" data-tf="1w">1W</button>
            <button class="tf-btn" data-tf="1M">1M</button>
          </div>
          <div class="chart-type-group">
            <button class="ct-btn active" data-type="candlestick" title="Candlestick">&#9632;</button>
            <button class="ct-btn" data-type="line" title="Line">&#9135;</button>
          </div>
        </div>
        <!-- Chart Container -->
        <div class="chart-container" id="chart-container"></div>
        <!-- Price Info -->
        <div class="price-info" id="price-info"></div>
      </div>

      <!-- Right Panel: Details -->
      <aside class="detail-panel" id="detail-panel">
        <div class="detail-header">Market Overview</div>
        <div class="detail-grid" id="detail-grid"></div>
      </aside>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
  <script src="app.js"></script>
</body>
</html>
